{% extends "base.html" %}
{% block content %}
<div class="cap-container" style="max-width:800px;">

    <div class="cap-header">
        <div>
            <h2 class="cap-title">Editar Actividad</h2>
            <p class="cap-subtitle">Procedimiento: {{ actividad.procedimiento.nombre_procedimiento }}</p>
        </div>
        <a href="{{ url_for('main.cat_procedimientos') }}" class="cap-btn-menu">← Regresar</a>
    </div>

    <div class="cap-card">
        <div class="cap-legend">Modificar Datos de la Actividad</div>

        <form action="{{ url_for('main.editar_actividad', id=actividad.id_actividad) }}" method="POST">

            <div class="cap-grid-1">
                <div class="cap-field">
                    <label class="cap-label">Descripción de la Actividad</label>
                    <textarea name="descripcion_actividad" class="cap-textarea"
                              rows="3" required>{{ actividad.descripcion_actividad }}</textarea>
                </div>
            </div>

            <div class="cap-grid-2">
                <div class="cap-field">
                    <label class="cap-label">Responsable (Cargo)</label>
                    <input type="text" name="responsable" class="cap-input"
                           value="{{ actividad.responsable_ejecucion }}" required>
                </div>
                <div class="cap-field">
                    <label class="cap-label">Producto (Tipo Documental)</label>
                    <input type="text" name="producto" class="cap-input"
                           value="{{ actividad.tipo_documental_producido }}">
                </div>
            </div>

            <div class="cap-grid-2" style="background:#fdfaf3; border:1px solid var(--dorado-suave); border-radius:8px; padding:12px; margin-bottom:14px;">
                <div class="cap-field">
                    <label class="cap-label">Tipo de Vinculación</label>
                    <select name="tipo_coord" class="cap-select" id="tipo_coord" onchange="actualizarOpciones()">
                        <option value="INT" {% if actividad.id_ua %}selected{% endif %}>INTERNA (SMADSOT)</option>
                        <option value="EXT" {% if actividad.id_area_ext %}selected{% endif %}>EXTERNA</option>
                    </select>
                </div>
                <div class="cap-field">
                    <label class="cap-label">Área / Institución</label>
                    <select name="id_coord" class="cap-select" id="select_coord">
                        <optgroup label="UNIDADES ADMINISTRATIVAS" id="grupo_int">
                            {% for u in unidades %}
                            <option value="{{ u.id_ua }}"
                                {% if actividad.id_ua == u.id_ua %}selected{% endif %}>
                                {{ u.siglas_ua }} — {{ u.nombre_ua }}
                            </option>
                            {% endfor %}
                        </optgroup>
                        <optgroup label="ÁREAS EXTERNAS" id="grupo_ext">
                            {% for e in externas %}
                            <option value="{{ e.id_area_ext }}"
                                {% if actividad.id_area_ext == e.id_area_ext %}selected{% endif %}>
                                {{ e.nombre_institucion }} — {{ e.nombre_area_externa }}
                            </option>
                            {% endfor %}
                        </optgroup>
                    </select>
                </div>
            </div>

            <div class="cap-actions">
                <a href="{{ url_for('main.cat_procedimientos') }}" class="cap-btn-cancel">Cancelar</a>
                <button type="submit" class="cap-btn-save">Guardar Cambios</button>
            </div>

        </form>
    </div>

</div>

<script>
function actualizarOpciones() {
    const tipo = document.getElementById('tipo_coord').value;
    const select = document.getElementById('select_coord');
    const grupoInt = document.getElementById('grupo_int');
    const grupoExt = document.getElementById('grupo_ext');

    if (tipo === 'INT') {
        grupoInt.style.display = '';
        grupoExt.style.display = 'none';
        select.value = grupoInt.querySelector('option')?.value || '';
    } else {
        grupoInt.style.display = 'none';
        grupoExt.style.display = '';
        select.value = grupoExt.querySelector('option')?.value || '';
    }
}

document.addEventListener('DOMContentLoaded', actualizarOpciones);
</script>
{% endblock %}
