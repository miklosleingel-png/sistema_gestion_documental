{% extends "base.html" %}
{% block content %}
<div class="cap-container" style="max-width: 700px;">

    <div class="cap-header">
        <div>
            <h2 class="cap-title">Editar Función Institucional</h2>
            <p class="cap-subtitle">ID: {{ registro.id_funcion }}</p>
        </div>
        <a href="{{ url_for('main.cat_funciones') }}" class="cap-btn-menu">← Regresar</a>
    </div>

    <div class="cap-card">
        <div class="cap-legend">Modificar Datos</div>
        <form action="{{ url_for('main.editar_funcion', id_func=registro.id_funcion) }}" method="POST">

            <div class="cap-grid-1">
                <div class="cap-field">
                    <label class="cap-label">Nombre de la Función</label>
                    <input type="text" name="nombre_funcion" class="cap-input"
                           value="{{ registro.nombre_funcion }}" required>
                </div>
            </div>

            <div class="cap-grid-1">
                <div class="cap-field">
                    <label class="cap-label">Descripción</label>
                    <textarea name="descripcion_funcion" class="cap-textarea"
                              rows="4">{{ registro.descripcion_funcion or '' }}</textarea>
                </div>
            </div>

            <div class="cap-actions">
                <a href="{{ url_for('main.cat_funciones') }}" class="cap-btn-cancel">Cancelar</a>
                <button type="submit" class="cap-btn-save">Guardar Cambios</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
