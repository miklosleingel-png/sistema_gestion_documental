{% extends "base.html" %}
{% block content %}
<div class="cap-container" style="max-width: 800px;">

    <div class="cap-header">
        <div>
            <h2 class="cap-title">Editar Fundamento Legal</h2>
            <p class="cap-subtitle">{{ registro.siglas_ley }} — Art. {{ registro.articulo }}</p>
        </div>
        <a href="{{ url_for('main.cat_leyes') }}" class="cap-btn-menu">← Regresar</a>
    </div>

    <div class="cap-card">
        <div class="cap-legend">Modificar Datos del Fundamento Legal</div>
        <form action="{{ url_for('main.editar_ley', id_ley=registro.id_ley) }}" method="POST">

            <div class="cap-grid-1">
                <div class="cap-field">
                    <label class="cap-label">Nombre de la Ley / Norma</label>
                    <input type="text" name="nombre_ley" class="cap-input"
                           value="{{ registro.nombre_ley }}" required>
                </div>
            </div>

            <div class="cap-grid-2">
                <div class="cap-field">
                    <label class="cap-label">Siglas</label>
                    <input type="text" name="siglas_ley" class="cap-input"
                           value="{{ registro.siglas_ley }}" required>
                </div>
                <div class="cap-field">
                    <label class="cap-label">Ámbito</label>
                    <select name="ambito" class="cap-select">
                        <option value="FEDERAL" {% if registro.ambito == 'FEDERAL' %}selected{% endif %}>FEDERAL</option>
                        <option value="ESTATAL" {% if registro.ambito == 'ESTATAL' %}selected{% endif %}>ESTATAL</option>
                        <option value="MUNICIPAL" {% if registro.ambito == 'MUNICIPAL' %}selected{% endif %}>MUNICIPAL</option>
                    </select>
                </div>
            </div>

            <div class="cap-grid-3">
                <div class="cap-field">
                    <label class="cap-label">Artículo</label>
                    <input type="text" name="articulo" class="cap-input"
                           value="{{ registro.articulo or '' }}" placeholder="Ej. 4">
                </div>
                <div class="cap-field">
                    <label class="cap-label">Fracción</label>
                    <input type="text" name="fraccion" class="cap-input"
                           value="{{ registro.fraccion or '' }}" placeholder="Ej. VII">
                </div>
                <div class="cap-field">
                    <label class="cap-label">Inciso</label>
                    <input type="text" name="inciso" class="cap-input"
                           value="{{ registro.inciso or '' }}" placeholder="Ej. a)">
                </div>
            </div>

            <div class="cap-grid-1">
                <div class="cap-field">
                    <label class="cap-label">Texto de la Ley</label>
                    <textarea name="texto_ley" class="cap-textarea"
                              rows="5">{{ registro.texto_ley or '' }}</textarea>
                </div>
            </div>

            <div class="cap-actions">
                <a href="{{ url_for('main.cat_leyes') }}" class="cap-btn-cancel">Cancelar</a>
                <button type="submit" class="cap-btn-save">Guardar Cambios</button>
            </div>
        </form>
    </div>

</div>
{% endblock %}
