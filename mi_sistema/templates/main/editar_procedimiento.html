{% extends "base.html" %}

{% block content %}
<div class="container-capture">
    <header class="section-header">
        <h2 style="color: #691C32;">Editar Procedimiento Administrativo</h2>
        <p>Modifique los datos generales y la vinculación institucional del registro.</p>
    </header>

    <form action="{{ url_for('main.editar_procedimiento', id=procedimiento.id_procedimiento) }}" method="POST">
        
        <div style="background:#f8f1f4; padding:20px; border-radius:8px; margin-bottom:20px; border-left: 5px solid #691C32;">
            <label style="font-weight: bold; color: #691C32;">Nombre del Procedimiento:</label>
            <input type="text" name="nombre_procedimiento" value="{{ procedimiento.nombre_procedimiento }}" 
                   style="width: 100%; margin-top:10px; padding:12px; border:1px solid #ccc; border-radius:4px;" required>
        </div>

        <h3 style="color: #B08B57; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top:30px;">Detalles de la Actividad</h3>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:15px;">
            <div>
                <label style="font-weight: bold; font-size: 0.9rem;">Responsable (Cargo):</label>
                <input type="text" name="responsable" value="{{ procedimiento.responsable_ejecucion }}" 
                       style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
            <div>
                <label style="font-weight: bold; font-size: 0.9rem;">Producto (Tipo Documental):</label>
                <input type="text" name="producto" value="{{ procedimiento.tipo_documental_producido }}" 
                       style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 15px; margin-top: 20px; background: #fdfaf3; padding: 15px; border-radius: 8px; border: 1px solid #f0e6d2;">
            <div>
                <label style="font-weight: bold; font-size: 0.9rem;">Tipo de Vinculación:</label>
                <select name="tipo_coord" class="form-control" style="width: 100%; height: 40px; border:1px solid #ccc;">
                    <option value="INT" {% if procedimiento.id_ua %}selected{% endif %}>INTERNA (SMADSOT)</option>
                    <option value="EXT" {% if procedimiento.id_area_ext %}selected{% endif %}>EXTERNA</option>
                </select>
            </div>
            <div>
                <label style="font-weight: bold; font-size: 0.9rem;">Área / Institución Vinculada:</label>
                <select name="id_coord" class="form-control" style="width: 100%; height: 40px; border:1px solid #ccc;">
                    <optgroup label="UNIDADES ADMINISTRATIVAS">
                        {% for u in unidades %}
                        <option value="{{ u.id_ua }}" {% if procedimiento.id_ua == u.id_ua %}selected{% endif %}>
                            {{ u.siglas_ua }} - {{ u.nombre_ua }}
                        </option>
                        {% endfor %}
                    </optgroup>
                    <optgroup label="ÁREAS EXTERNAS">
                        {% for e in externas %}
                        <option value="{{ e.id_area_ext }}" {% if procedimiento.id_area_ext == e.id_area_ext %}selected{% endif %}>
                            {{ e.nombre_institucion }} - {{ e.nombre_area_externa }}
                        </option>
                        {% endfor %}
                    </optgroup>
                </select>
            </div>
        </div>

        <div style="margin-top:20px;">
            <label style="font-weight: bold; font-size: 0.9rem; display:block; margin-bottom:8px;">Descripción de la Actividad:</label>
            <textarea name="descripcion_actividad" rows="4" 
                      style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">{{ procedimiento.descripcion_actividad }}</textarea>
        </div>
        
        <div style="display: flex; gap: 15px; border-top: 1px solid #eee; padding-top: 25px; margin-top: 30px;">
            <button type="submit" class="btn-next" style="background: #691C32; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold;">
                💾 Actualizar Registro
            </button>
            <a href="{{ url_for('main.cat_procedimientos') }}" class="btn-back" 
               style="background: #eee; color: #333; padding: 12px 30px; border-radius: 6px; text-decoration: none; text-align: center;">
                Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
